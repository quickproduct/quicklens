# ============================================================================
# QuickLens - Docker Compose
# ============================================================================
# Usage: docker compose up -d
# Dashboard: http://localhost
# ============================================================================

services:
  quicklens:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CONTAINER_PREFIX:-ql}-app
    restart: unless-stopped
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DEFAULT_ADMIN_EMAIL=${DEFAULT_ADMIN_EMAIL:-admin@quicklens.local}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-admin}
      - ALLOW_REGISTRATION=${ALLOW_REGISTRATION:-true}
      - SQLITE_DB_PATH=/app/data/quicklens.db
      - OLLAMA_HOST=${OLLAMA_HOST:-host.docker.internal}
      - OLLAMA_PORT=${OLLAMA_PORT:-11434}
      - SEED_DEMO_DATA=${SEED_DEMO_DATA:-true}
      - DATA_RETENTION_DAYS=${DATA_RETENTION_DAYS:-30}
    volumes:
      - ql-data:/app/data
    ports:
      - "${EXTERNAL_PORT:-8081}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 128m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Optional: Ollama service
  ollama:
    image: ollama/ollama:latest
    container_name: ${CONTAINER_PREFIX:-ql}-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    profiles:
      - ollama

  # Optional: PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: ${CONTAINER_PREFIX:-ql}-postgres
    environment:
      - POSTGRES_DB=quicklens
      - POSTGRES_USER=quicklens
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-quicklens}
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    profiles:
      - postgres

  # Optional: ClickHouse
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: ${CONTAINER_PREFIX:-ql}-clickhouse
    volumes:
      - ch-data:/var/lib/clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    profiles:
      - clickhouse

volumes:
  ql-data:
    name: ${CONTAINER_PREFIX:-ql}-data
  ollama-models:
    name: ${CONTAINER_PREFIX:-ql}-ollama-models
  pg-data:
    name: ${CONTAINER_PREFIX:-ql}-pg-data
  ch-data:
    name: ${CONTAINER_PREFIX:-ql}-ch-data
